<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Diary - Daily Writing & Proofreading</title>

<!--
  ============================================================
  ENGLISH DIARY WEB APP
  ============================================================
  A single-file web application for daily English diary writing
  with AI proofreading, word lookup, and translation features.
  
  DATA MODEL (localStorage key: "diary_entries_v1"):
  {
    "2025-01-15": {
      "originalText": "Today I go to the store...",
      "proofreadText": "Today I went to the store...",
      "lastEditedAt": "2025-01-15T10:30:00.000Z",
      "proofreadAt": "2025-01-15T10:35:00.000Z"
    },
    ...
  }
  
  ENDPOINTS TO CONFIGURE:
  1. Proofread API: Replace https://my-diary-2026.vercel.app/api/proofread with your backend URL
     - Expects POST with JSON body: { "text": "..." }
     - Returns JSON: { "proofreadText": "..." }
     - Compatible with OpenAI, Anthropic, or custom proxy
  
  2. Translate API: Replace {{TRANSLATE_API_ENDPOINT}} with LibreTranslate or similar
     - Expects POST with JSON body: { "q": "...", "source": "en", "target": "zh" }
     - Returns JSON: { "translatedText": "..." }
  
  3. Dictionary API: Uses free https://api.dictionaryapi.dev (no config needed)
  ============================================================
-->

<style>
/* ============================================================
   CSS RESET & BASE STYLES
   ============================================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #4a6fa5;
  --primary-dark: #345080;
  --primary-light: #e8eef6;
  --accent: #e07a5f;
  --accent-light: #fdf0ec;
  --bg: #f5f7fa;
  --card-bg: #ffffff;
  --text: #2d3436;
  --text-light: #636e72;
  --border: #dfe6e9;
  --mark-bg: #fff3cd;
  --mark-add: #d4edda;
  --mark-del: #f8d7da;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 8px;
  --transition: 0.2s ease;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ============================================================
   HEADER
   ============================================================ */
header {
  background: var(--primary);
  color: white;
  padding: 16px 24px;
  box-shadow: var(--shadow);
  position: sticky;
  top: 0;
  z-index: 100;
}

header h1 {
  font-size: 1.4rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

header h1 .icon {
  font-size: 1.6rem;
}

/* ============================================================
   MAIN CONTAINER
   ============================================================ */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* ============================================================
   DATE NAVIGATION BAR
   ============================================================ */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 16px;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.date-nav button {
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--primary);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  transition: all var(--transition);
}

.date-nav button:hover, .date-nav button:focus {
  background: var(--primary-light);
  border-color: var(--primary);
  outline: none;
}

.date-nav button:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}

.date-display {
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--primary-dark);
  min-width: 180px;
  text-align: center;
}

.date-nav input[type="date"] {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9rem;
  color: var(--text);
  cursor: pointer;
}

.date-nav input[type="date"]:focus {
  outline: 2px solid var(--primary);
  outline-offset: 1px;
}

.btn-today {
  background: var(--primary) !important;
  color: white !important;
  border-color: var(--primary) !important;
}

.btn-today:hover {
  background: var(--primary-dark) !important;
}

/* ============================================================
   MINI CALENDAR
   ============================================================ */
.calendar-section {
  margin-bottom: 20px;
}

.calendar-toggle {
  display: flex;
  justify-content: center;
  margin-bottom: 8px;
}

.calendar-toggle button {
  padding: 6px 16px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text-light);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all var(--transition);
}

.calendar-toggle button:hover {
  background: var(--primary-light);
}

.mini-calendar {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  display: none;
  max-width: 360px;
  margin: 0 auto;
}

.mini-calendar.visible {
  display: block;
}

.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.cal-header button {
  background: none;
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-size: 1rem;
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}

.cal-header button:hover {
  background: var(--primary-light);
}

.cal-header span {
  font-weight: 600;
  color: var(--primary-dark);
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  text-align: center;
}

.cal-grid .day-label {
  font-size: 0.75rem;
  color: var(--text-light);
  font-weight: 600;
  padding: 4px;
}

.cal-grid .day-cell {
  padding: 6px 4px;
  border-radius: 50%;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cal-grid .day-cell:hover {
  background: var(--primary-light);
}

.cal-grid .day-cell.today {
  border: 2px solid var(--primary);
  font-weight: 700;
}

.cal-grid .day-cell.selected {
  background: var(--primary);
  color: white;
}

.cal-grid .day-cell.has-entry::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

.cal-grid .day-cell.other-month {
  color: #ccc;
}

.cal-grid .day-cell.empty {
  cursor: default;
}

/* ============================================================
   STATUS BAR
   ============================================================ */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 16px;
  padding: 12px 16px;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  font-size: 0.85rem;
  color: var(--text-light);
}

.status-bar .status-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
}

.status-badge.proofread {
  background: var(--mark-add);
  color: #155724;
}

.status-badge.not-proofread {
  background: var(--mark-bg);
  color: #856404;
}

/* ============================================================
   TWO-COLUMN COMPARISON LAYOUT
   ============================================================ */
.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

@media (max-width: 768px) {
  .columns {
    grid-template-columns: 1fr;
  }
}

.column {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.column-header {
  padding: 12px 16px;
  font-weight: 600;
  font-size: 0.95rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.column-header.original {
  background: var(--primary-light);
  color: var(--primary-dark);
}

.column-header.proofread-header {
  background: var(--accent-light);
  color: var(--accent);
}

.column-body {
  padding: 16px;
  flex: 1;
  min-height: 300px;
}

/* Editable textarea */
#original-text {
  width: 100%;
  min-height: 280px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 1rem;
  line-height: 1.8;
  resize: vertical;
  color: var(--text);
  transition: border-color var(--transition);
}

#original-text:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.15);
}

#original-text::placeholder {
  color: #b2bec3;
  font-style: italic;
}

/* Proofread display area */
#proofread-display {
  min-height: 280px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 1rem;
  line-height: 1.8;
  background: #fafafa;
  color: var(--text);
  white-space: pre-wrap;
  word-wrap: break-word;
}

.empty-proofread {
  color: var(--text-light);
  font-style: italic;
  text-align: center;
  padding-top: 40px;
}

/* Diff highlighting */
mark.change {
  background: var(--mark-bg);
  padding: 1px 3px;
  border-radius: 3px;
  font-style: normal;
}

mark.added {
  background: var(--mark-add);
  padding: 1px 3px;
  border-radius: 3px;
}

mark.removed {
  background: var(--mark-del);
  padding: 1px 3px;
  border-radius: 3px;
  text-decoration: line-through;
}

/* ============================================================
   ACTION BUTTONS
   ============================================================ */
.actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  justify-content: center;
}

.btn {
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 500;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  background: var(--primary-dark);
}

.btn-accent {
  background: var(--accent);
  color: white;
}

.btn-accent:hover {
  background: #c96a4f;
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}

.btn-outline:hover {
  background: var(--primary-light);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ============================================================
   PAGINATION
   ============================================================ */
.pagination {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 20px;
  border-top: 1px solid var(--border);
}

/* ============================================================
   WORD LOOKUP POPUP
   ============================================================ */
.lookup-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 500;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.lookup-overlay.visible {
  display: flex;
}

.lookup-card {
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  max-width: 480px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px;
  position: relative;
}

.lookup-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  color: var(--text-light);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: all var(--transition);
}

.lookup-close:hover {
  background: var(--bg);
}

.lookup-word {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--primary-dark);
  margin-bottom: 4px;
}

.lookup-phonetic {
  font-size: 1rem;
  color: var(--text-light);
  font-style: italic;
  margin-bottom: 16px;
}

.lookup-translation {
  background: var(--primary-light);
  padding: 10px 14px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  font-size: 1rem;
  font-weight: 500;
  color: var(--primary-dark);
}

.lookup-section {
  margin-bottom: 14px;
}

.lookup-section h4 {
  font-size: 0.85rem;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.lookup-definition {
  margin-bottom: 8px;
  padding-left: 12px;
  border-left: 3px solid var(--primary-light);
}

.lookup-definition .part-of-speech {
  font-style: italic;
  color: var(--accent);
  font-size: 0.85rem;
}

.lookup-definition .def-text {
  margin: 4px 0;
}

.lookup-definition .example {
  color: var(--text-light);
  font-style: italic;
  font-size: 0.9rem;
}

.lookup-loading {
  text-align: center;
  color: var(--text-light);
  padding: 20px;
}

.lookup-error {
  text-align: center;
  color: var(--accent);
  padding: 20px;
}

/* ============================================================
   CONTEXT MENU (floating tooltip for word lookup)
   ============================================================ */
.context-menu {
  display: none;
  position: fixed;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  padding: 4px;
  z-index: 400;
  min-width: 160px;
}

.context-menu.visible {
  display: block;
}

.context-menu button {
  display: block;
  width: 100%;
  padding: 8px 16px;
  border: none;
  background: none;
  text-align: left;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text);
  border-radius: 4px;
  transition: background var(--transition);
}

.context-menu button:hover {
  background: var(--primary-light);
}

/* ============================================================
   LOADING SPINNER
   ============================================================ */
.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid #fff;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 600px) {
  header h1 {
    font-size: 1.1rem;
  }

  .date-nav {
    padding: 12px;
    gap: 8px;
  }

  .date-display {
    font-size: 1rem;
    min-width: auto;
  }

  .actions {
    flex-direction: column;
    align-items: stretch;
  }

  .btn {
    justify-content: center;
  }

  .status-bar {
    flex-direction: column;
    align-items: flex-start;
  }
}

/* ============================================================
   DIFF LEGEND
   ============================================================ */
.diff-legend {
  display: flex;
  gap: 16px;
  font-size: 0.8rem;
  color: var(--text-light);
  justify-content: flex-end;
  flex-wrap: wrap;
}

.diff-legend span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.diff-legend .swatch {
  display: inline-block;
  width: 14px;
  height: 14px;
  border-radius: 3px;
}

.diff-legend .swatch.add { background: var(--mark-add); }
.diff-legend .swatch.del { background: var(--mark-del); }
.diff-legend .swatch.chg { background: var(--mark-bg); }

/* ============================================================
   NOTIFICATION TOAST
   ============================================================ */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--primary-dark);
  color: white;
  padding: 12px 20px;
  border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  font-size: 0.9rem;
  z-index: 600;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s ease;
  pointer-events: none;
}

.toast.visible {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>
  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header>
    <h1><span class="icon">📝</span> English Diary</h1>
  </header>

  <main class="container">
    <!-- ============================================================
         DATE NAVIGATION
         ============================================================ -->
    <nav class="date-nav" aria-label="Date navigation">
      <button id="btn-prev" aria-label="Previous day" title="Previous Day">◀ Prev</button>
      <div class="date-display" id="date-display"></div>
      <button id="btn-next" aria-label="Next day" title="Next Day">Next ▶</button>
      <input type="date" id="date-picker" aria-label="Select date" title="Jump to date">
      <button class="btn-today" id="btn-today">Today</button>
    </nav>

    <!-- ============================================================
         MINI CALENDAR
         ============================================================ -->
    <section class="calendar-section" aria-label="Mini calendar">
      <div class="calendar-toggle">
        <button id="btn-toggle-cal">📅 Show Calendar</button>
      </div>
      <div class="mini-calendar" id="mini-calendar" role="grid" aria-label="Monthly calendar">
        <div class="cal-header">
          <button id="cal-prev-month" aria-label="Previous month">◀</button>
          <span id="cal-month-label"></span>
          <button id="cal-next-month" aria-label="Next month">▶</button>
        </div>
        <div class="cal-grid" id="cal-grid">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>

    <!-- ============================================================
         STATUS BAR
         ============================================================ -->
    <div class="status-bar" aria-live="polite">
      <div class="status-item">
        <span>📅 Last Edited:</span>
        <span id="status-edited">—</span>
      </div>
      <div class="status-item">
        <span>🤖 Proofread:</span>
        <span id="status-proofread">—</span>
      </div>
    </div>

    <!-- ============================================================
         ACTION BUTTONS
         ============================================================ -->
    <div class="actions">
      <button class="btn btn-primary" id="btn-save" aria-label="Save diary entry">💾 Save</button>
      <button class="btn btn-accent" id="btn-proofread" aria-label="Run AI proofread">🤖 AI Proofread</button>
      <button class="btn btn-outline" id="btn-reproofread" aria-label="Re-run AI proofread" style="display:none;">🔄 Re-Proofread</button>
      <button class="btn btn-outline" id="btn-clear" aria-label="Clear entry for this date">🗑️ Clear</button>
    </div>

    <!-- ============================================================
         TWO-COLUMN COMPARISON
         ============================================================ -->
    <div class="columns">
      <!-- LEFT: Original text (editable) -->
      <article class="column" aria-label="Original text">
        <div class="column-header original">
          <span>✏️ Your Writing</span>
        </div>
        <div class="column-body">
          <textarea
            id="original-text"
            placeholder="Start writing your diary entry for today...&#10;&#10;Tip: Select any word, then right-click to look it up!"
            aria-label="Diary text editor"
          ></textarea>
        </div>
      </article>

      <!-- RIGHT: Proofread text (non-editable, with diff highlights) -->
      <article class="column" aria-label="Proofread text">
        <div class="column-header proofread-header">
          <span>🤖 AI Proofread Version</span>
          <div class="diff-legend">
            <span><span class="swatch add"></span> Added</span>
            <span><span class="swatch del"></span> Removed</span>
            <span><span class="swatch chg"></span> Changed</span>
          </div>
        </div>
        <div class="column-body">
          <div id="proofread-display" aria-label="Proofread result" role="region">
            <div class="empty-proofread">No proofread version yet.<br>Click "AI Proofread" to get started.</div>
          </div>
        </div>
      </article>
    </div>

    <!-- ============================================================
         BOTTOM PAGINATION
         ============================================================ -->
    <nav class="pagination" aria-label="Page navigation">
      <button class="btn btn-outline" id="btn-prev-bottom" aria-label="Previous day">◀ Previous Day</button>
      <button class="btn btn-outline" id="btn-next-bottom" aria-label="Next day">Next Day ▶</button>
    </nav>
  </main>

  <!-- ============================================================
       CUSTOM CONTEXT MENU
       ============================================================ -->
  <div class="context-menu" id="context-menu" role="menu">
    <button id="ctx-lookup" role="menuitem">🔍 Look up word</button>
  </div>

  <!-- ============================================================
       WORD LOOKUP OVERLAY
       ============================================================ -->
  <div class="lookup-overlay" id="lookup-overlay" role="dialog" aria-label="Word lookup" aria-modal="true">
    <div class="lookup-card" id="lookup-card">
      <button class="lookup-close" id="lookup-close" aria-label="Close lookup">✕</button>
      <div id="lookup-content">
        <div class="lookup-loading">Loading...</div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       TOAST NOTIFICATION
       ============================================================ -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* ============================================================
   ENGLISH DIARY APP - MAIN JAVASCRIPT
   ============================================================
   
   Architecture:
   - State management via a simple object and localStorage
   - All date keys use ISO format "YYYY-MM-DD"
   - Modular functions for each feature area
   
   To connect a real AI proofreading backend:
   1. Set USE_MOCK_PROOFREAD = false below
   2. Replace PROOFREAD_API_ENDPOINT with your URL
   3. The endpoint should accept POST { "text": "..." }
      and return { "proofreadText": "corrected text..." }
   
   Example with OpenAI-compatible API:
   POST https://your-backend.com/proofread

/**
 * Format a Date object to ISO date string "YYYY-MM-DD"
 */
function toISODate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

/**
 * Parse "YYYY-MM-DD" to a Date object (local timezone)
 */
function parseISODate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

/**
 * Format date for display: "Monday, January 15, 2025"
 */
function formatDateDisplay(date) {
  return date.toLocaleDateString('en-US', {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
}

/**
 * Format timestamp for status display
 */
function formatTimestamp(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  return d.toLocaleString('en-US', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });
}

/**
 * Show a toast notification
 */
function showToast(message, duration = 2500) {
  $toast.textContent = message;
  $toast.classList.add('visible');
  setTimeout(() => $toast.classList.remove('visible'), duration);
}

/**
 * Get all diary entries from localStorage
 * @returns {Object} Map of "YYYY-MM-DD" => entry object
 */
function getAllEntries() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : {};
  } catch (e) {
    console.error('Failed to read entries from localStorage:', e);
    return {};
  }
}

/**
 * Save all entries to localStorage
 */
function saveAllEntries(entries) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch (e) {
    console.error('Failed to save entries to localStorage:', e);
    showToast('⚠️ Failed to save. Storage may be full.');
  }
}

/**
 * Get entry for a specific date
 * @param {string} dateKey - "YYYY-MM-DD"
 * @returns {Object|null} Entry or null
 */
function getEntry(dateKey) {
  const entries = getAllEntries();
  return entries[dateKey] || null;
}

/**
 * Save/update entry for a specific date
 * @param {string} dateKey
 * @param {Object} entryData - partial data to merge
 */
function saveEntry(dateKey, entryData) {
  const entries = getAllEntries();
  entries[dateKey] = { ...(entries[dateKey] || {}), ...entryData };
  saveAllEntries(entries);
}

/**
 * Delete entry for a specific date
 */
function deleteEntry(dateKey) {
  const entries = getAllEntries();
  delete entries[dateKey];
  saveAllEntries(entries);
}

/**
 * Get all date keys that have entries
 * @returns {Set<string>} Set of "YYYY-MM-DD" strings
 */
function getEntryDates() {
  return new Set(Object.keys(getAllEntries()));
}

 * }
 * Response: { "choices": [{"message": {"content": "corrected text"}}] }
 * 
 * @param {string} text - Original text to proofread
 * @returns {Promise<string>} Proofread text
 */
async function callProofreadAPI(text) {
  if (USE_MOCK_PROOFREAD) {
    return mockProofread(text);
  }

  /*
   * Real API call implementation:
   * Uncomment and modify for your backend.
   */
  try {
    const response = await fetch(PROOFREAD_API_ENDPOINT, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        // Add authorization headers as needed:
        // 'Authorization': 'Bearer YOUR_API_KEY',
      },
      body: JSON.stringify({
        text: text
        // For OpenAI-style APIs, you'd structure differently:
        // model: 'gpt-4',
        // messages: [
        //   { role: 'system', content: 'Proofread and correct the following English text. Return only corrected text.' },
        //   { role: 'user', content: text }
        // ]
      })
    });

    if (!response.ok) {
      throw new Error(`API error: ${response.status}`);
    }

    const data = await response.json();
    
    // Adjust based on your API's response format:
    // For custom backend: data.proofreadText
    // For OpenAI: data.choices[0].message.content
    return data.proofreadText || data.choices?.[0]?.message?.content || text;
  } catch (error) {
    console.error('Proofread API failed:', error);
    showToast('⚠️ API call failed. Using mock proofread.');
    return mockProofread(text);
  }
}

    [/([.!?]\s+)([a-z])/g, (m, p, c) => p + c.toUpperCase()],

// ============================================================
// DIFF ALGORITHM
// ============================================================

/**
 * Simple word-level diff using Longest Common Subsequence (LCS).
 * Tokenizes both texts by words/whitespace and computes changes.
 * 
 * @param {string} original - Original text
 * @param {string} proofread - Proofread text
 * @returns {string} HTML with diff highlighting
 */
function computeDiffHTML(original, proofread) {
  if (!original && !proofread) return '';
  if (!original) return escapeHTML(proofread);
  if (!proofread) return escapeHTML(original);

  // Tokenize by splitting into words and whitespace
  const tokensA = tokenize(original);
  const tokensB = tokenize(proofread);

  // Compute LCS table
  const lcs = computeLCS(tokensA, tokensB);

  // Build diff output
  const diff = buildDiff(tokensA, tokensB, lcs);

  return diff;
}

/**
 * Tokenize text into an array of words and whitespace tokens
 */
function tokenize(text) {
  // Split into words and whitespace, preserving both
  const tokens = [];
  const regex = /(\S+|\s+)/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    tokens.push(match[1]);
  }
  return tokens;
}

/**
 * Compute LCS (Longest Common Subsequence) table
 */
function computeLCS(a, b) {
  const m = a.length;
  const n = b.length;
  
  // Create DP table
  const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
  
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i - 1] === b[j - 1]) {
        dp[i][j] = dp[i - 1][j - 1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
      }
    }
  }
  
  return dp;
}

/**
 * Build diff HTML from LCS table using backtracking
 */
function buildDiff(a, b, dp) {
  let i = a.length;
  let j = b.length;
  const result = [];

  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i - 1] === b[j - 1]) {
      // Same token
      result.unshift(escapeHTML(a[i - 1]));
      i--;
      j--;
    } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
      // Added in proofread version
      const token = b[j - 1].trim();
      if (token) {
        result.unshift(`<mark class="added" title="Added">${escapeHTML(b[j - 1])}</mark>`);
      } else {
        result.unshift(escapeHTML(b[j - 1]));
      }
      j--;
    } else if (i > 0) {
      // Removed from original
      const token = a[i - 1].trim();
      if (token) {
        result.unshift(`<mark class="removed" title="Removed">${escapeHTML(a[i - 1])}</mark>`);
      } else {
        result.unshift(escapeHTML(a[i - 1]));
      }
      i--;
    }
  }

  return result.join('');
}

/**
 * Escape HTML special characters
 */
function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/**
 * Render the mini calendar for the current calMonth/calYear
 */
function renderCalendar() {
  const entryDates = getEntryDates();
  const today = new Date();
  const todayKey = toISODate(today);
  const selectedKey = toISODate(currentDate);

  // Month/year label
  const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
    'July', 'August', 'September', 'October', 'November', 'December'];
  $calMonthLabel.textContent = `${monthNames[calMonth]} ${calYear}`;

  // Build grid
  let html = '';

  // Day labels
  const dayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  for (const label of dayLabels) {
    html += `<div class="day-label">${label}</div>`;
  }

  // First day of month and number of days
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(calYear, calMonth, 0).getDate();

  // Previous month days (fill)
  for (let i = firstDay - 1; i >= 0; i--) {
    const day = daysInPrevMonth - i;
    const prevMonth = calMonth === 0 ? 11 : calMonth - 1;
    const prevYear = calMonth === 0 ? calYear - 1 : calYear;
    const dateKey = toISODate(new Date(prevYear, prevMonth, day));
    const hasEntry = entryDates.has(dateKey);
    html += `<div class="day-cell other-month${hasEntry ? ' has-entry' : ''}" data-date="${dateKey}" tabindex="0" role="gridcell" aria-label="${dateKey}">${day}</div>`;
  }

  // Current month days
  for (let day = 1; day <= daysInMonth; day++) {
    const dateKey = toISODate(new Date(calYear, calMonth, day));
    const hasEntry = entryDates.has(dateKey);
    const isToday = dateKey === todayKey;
    const isSelected = dateKey === selectedKey;

    let classes = 'day-cell';
    if (isToday) classes += ' today';
    if (isSelected) classes += ' selected';
    if (hasEntry) classes += ' has-entry';

    html += `<div class="${classes}" data-date="${dateKey}" tabindex="0" role="gridcell" aria-label="${formatDateDisplay(new Date(calYear, calMonth, day))}">${day}</div>`;
  }

  // Next month days (fill to complete the grid)
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let day = 1; day <= remaining; day++) {
    const nextMonth = calMonth === 11 ? 0 : calMonth + 1;
    const nextYear = calMonth === 11 ? calYear + 1 : calYear;
    const dateKey = toISODate(new Date(nextYear, nextMonth, day));
    const hasEntry = entryDates.has(dateKey);
    html += `<div class="day-cell other-month${hasEntry ? ' has-entry' : ''}" data-date="${dateKey}" tabindex="0" role="gridcell" aria-label="${dateKey}">${day}</div>`;
  }

  $calGrid.innerHTML = html;

  // Add click handlers to day cells
  $calGrid.querySelectorAll('.day-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const dateStr = cell.getAttribute('data-date');
      if (dateStr) {
        navigateToDate(parseISODate(dateStr));
        // Update calendar month/year to match selected date
        const d = parseISODate(dateStr);
        calMonth = d.getMonth();
        calYear = d.getFullYear();
        renderCalendar();
      }
    });
    // Keyboard support
    cell.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        cell.click();
      }
    });
  });
}

/**

function getSelectedWord() {
  const selection = window.getSelection();
  if (!selection || selection.rangeCount === 0) return '';
  const text = selection.toString().trim();
  // Extract first word if multiple selected
  const word = text.split(/\s+/)[0].replace(/[^a-zA-Z'-]/g, '');
  return word;
}

/**
 * Translate text from English to Chinese using the configured API.
 * 
 * To connect LibreTranslate:
 * POST https://libretranslate.com/translate
 * {
 *   "q": "text to translate",
 *   "source": "en",
 *   "target": "zh",
 *   "api_key": "YOUR_KEY"  // if required
 * }
 * Response: { "translatedText": "翻译文本" }
 * 
 * @param {string} text - English text to translate
 * @returns {Promise<string|null>} Chinese translation or null
 */
async function translateToChinese(text) {
  if (USE_MOCK_TRANSLATE) {
    // Fallback: return null to show English definition
    return null;
  }

  try {
    const body = {
      q: text,
      source: 'en',
      target: 'zh'
    };
    
    if (TRANSLATE_API_KEY) {
      body.api_key = TRANSLATE_API_KEY;
    }

    const response = await fetch(TRANSLATE_API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!response.ok) throw new Error(`Translate API error: ${response.status}`);
    
    const data = await response.json();
    return data.translatedText || null;
  } catch (error) {
    console.warn('Translation failed, falling back to English:', error);
    return null;
  }
}

/**
 * Perform word lookup and display results
 */
async function lookupWord(word) {
  if (!word) return;

  // Show overlay with loading state
  $lookupOverlay.classList.add('visible');
  $lookupContent.innerHTML = '<div class="lookup-loading">🔍 Looking up "<strong>' + escapeHTML(word) + '</strong>"...</div>';

  try {
    // Fetch dictionary data
    const dictData = await fetchDictionary(word);
    
    if (!dictData || dictData.length === 0) {
      throw new Error('No results found');
    }

    const entry = dictData[0];

    // Extract phonetic
    let phonetic = entry.phonetic || '';
    if (!phonetic && entry.phonetics) {
      for (const p of entry.phonetics) {
        if (p.text) { phonetic = p.text; break; }
      }
    }

    // Collect definitions and examples
    const meanings = entry.meanings || [];
    let firstDefinition = '';
    
    // Build HTML
    let html = `<div class="lookup-word">${escapeHTML(entry.word)}</div>`;
    
    if (phonetic) {
      html += `<div class="lookup-phonetic">${escapeHTML(phonetic)}</div>`;
    }

    // Get first definition for translation
    if (meanings.length > 0 && meanings[0].definitions && meanings[0].definitions.length > 0) {
      firstDefinition = meanings[0].definitions[0].definition;
    }

    // Attempt translation of first definition
    const translation = await translateToChinese(firstDefinition);
    if (translation) {
      html += `<div class="lookup-translation">🇨🇳 ${escapeHTML(translation)}</div>`;
    } else if (firstDefinition) {
      html += `<div class="lookup-translation">📖 ${escapeHTML(firstDefinition)}</div>`;
    }

    // All definitions
    html += '<div class="lookup-section"><h4>Definitions</h4>';
    
    for (const meaning of meanings) {
      const pos = meaning.partOfSpeech || '';
      const defs = meaning.definitions || [];
      
      for (const def of defs.slice(0, 3)) { // Limit to 3 per part of speech
        html += '<div class="lookup-definition">';
        if (pos) {
          html += `<div class="part-of-speech">${escapeHTML(pos)}</div>`;
        }
        html += `<div class="def-text">${escapeHTML(def.definition)}</div>`;
        if (def.example) {
          html += `<div class="example">"${escapeHTML(def.example)}"</div>`;
        }
        html += '</div>';
      }
    }
    
    html += '</div>';

    $lookupContent.innerHTML = html;

  } catch (error) {
    console.error('Lookup failed:', error);
    $lookupContent.innerHTML = `<div class="lookup-error">❌ Could not find "<strong>${escapeHTML(word)}</strong>" in the dictionary.<br><br><small>Try a different word or check the spelling.</small></div>`;
  }
}

/**
 * Close the lookup overlay
 */
function closeLookup() {
  $lookupOverlay.classList.remove('visible');
}


// ============================================================
// EVENT LISTENERS
// ============================================================

// --- Date navigation ---
$btnPrev.addEventListener('click', () => navigateByDays(-1));
$btnNext.addEventListener('click', () => navigateByDays(1));
$btnPrevBottom.addEventListener('click', () => navigateByDays(-1));
$btnNextBottom.addEventListener('click', () => navigateByDays(1));
$btnToday.addEventListener('click', () => {
  currentDate = new Date();
  calMonth = currentDate.getMonth();
  calYear = currentDate.getFullYear();
  refreshUI();
});

$datePicker.addEventListener('change', (e) => {
  if (e.target.value) {
    const d = parseISODate(e.target.value);
    calMonth = d.getMonth();
    calYear = d.getFullYear();
    navigateToDate(d);
  }
});

// Keyboard navigation for prev/next
document.addEventListener('keydown', (e) => {
  // Alt+Left / Alt+Right for date navigation
  if (e.altKey && e.key === 'ArrowLeft') {
    e.preventDefault();
    navigateByDays(-1);
  } else if (e.altKey && e.key === 'ArrowRight') {
    e.preventDefault();
    navigateByDays(1);
  }
  // Escape to close overlays
  if (e.key === 'Escape') {
    closeLookup();
    hideContextMenu();
  }
});

// --- Calendar toggle ---
$btnToggleCal.addEventListener('click', () => {
  const isVisible = $miniCalendar.classList.toggle('visible');
  $btnToggleCal.textContent = isVisible ? '📅 Hide Calendar' : '📅 Show Calendar';
  if (isVisible) {
    calMonth = currentDate.getMonth();
    calYear = currentDate.getFullYear();
    renderCalendar();
  }
});

$calPrevMonth.addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
});

$calNextMonth.addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
});

// --- Save and actions ---
$btnSave.addEventListener('click', saveCurrentEntry);
$btnProofread.addEventListener('click', runProofread);
$btnReproofread.addEventListener('click', () => {
  if (confirm('Re-run AI proofreading? This will overwrite the current proofread version.')) {
    runProofread();
  }
});
$btnClear.addEventListener('click', clearCurrentEntry);

// Ctrl+S / Cmd+S to save
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveCurrentEntry();
  }
});

// --- Context menu for word lookup ---

// Custom right-click on text areas
function handleContextMenu(e) {
  const word = getSelectedWord();
  if (word && word.length >= 2) {
    e.preventDefault();
    selectedWord = word;
    showContextMenu(e.clientX, e.clientY);
  }
}

$originalText.addEventListener('contextmenu', handleContextMenu);
$proofreadDisplay.addEventListener('contextmenu', handleContextMenu);

// Also support double-click to select word + show lookup button
function handleDblClick(e) {
  // Small delay to let selection happen
  setTimeout(() => {
    const word = getSelectedWord();
    if (word && word.length >= 2) {
      selectedWord = word;
      const rect = e.target.getBoundingClientRect();
      showContextMenu(e.clientX, e.clientY);
    }
  }, 50);
}

$originalText.addEventListener('dblclick', handleDblClick);
$proofreadDisplay.addEventListener('dblclick', handleDblClick);

// Context menu lookup button
$ctxLookup.addEventListener('click', () => {
  hideContextMenu();
  if (selectedWord) {
    lookupWord(selectedWord);
  }
});

// Hide context menu on click elsewhere
document.addEventListener('click', (e) => {
  if (!$contextMenu.contains(e.target)) {
    hideContextMenu();
  }
});

// Close lookup overlay
$lookupClose.addEventListener('click', closeLookup);
$lookupOverlay.addEventListener('click', (e) => {
  if (e.target === $lookupOverlay) {
    closeLookup();
  }
});

// Trap focus in lookup modal when visible
$lookupOverlay.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    // Keep focus within the modal
    e.preventDefault();
    $lookupClose.focus();
  }
});

/**
 * Initialize the app on page load
 */
function init() {
  // Set current date to today
  currentDate = new Date();
  calMonth = currentDate.getMonth();
  calYear = currentDate.getFullYear();

  // Refresh the entire UI
  refreshUI();

  console.log('📝 English Diary App initialized.');
  console.log('💡 Tip: Use Alt+← / Alt+→ for date navigation, Ctrl+S to save.');
  console.log('📖 Select a word and right-click to look it up!');
}

// Run init when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
